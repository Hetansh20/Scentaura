name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image for testing
        run: docker build -t scentaura-test .

      - name: Test DB connectivity
        run: |
          docker run --rm \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            scentaura-test php -r "
              \$conn = new mysqli(
                getenv('DB_HOST'),
                getenv('DB_USER'),
                getenv('DB_PASSWORD'),
                getenv('DB_NAME')
              );
              if (\$conn->connect_error) {
                echo 'DB FAIL: ' . \$conn->connect_error . PHP_EOL;
                exit(1);
              }
              echo 'DB PASS: Connected to ' . getenv('DB_HOST') . PHP_EOL;
              \$conn->close();
            "

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        run: |
          docker build -t scentaura-app .
          docker tag scentaura-app:latest 976497228635.dkr.ecr.ap-south-1.amazonaws.com/scentaura:${{ github.sha }}
          docker push 976497228635.dkr.ecr.ap-south-1.amazonaws.com/scentaura:${{ github.sha }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition scentaura-task --query taskDefinition > task-definition.json

      - name: Render new task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: scentaura-app
          image: 976497228635.dkr.ecr.ap-south-1.amazonaws.com/scentaura:${{ github.sha }}

      - name: Fix Deployment Deadlock
        run: |
          aws ecs update-service \
            --cluster scentaura-cluster \
            --service scentaura-service \
            --deployment-configuration "minimumHealthyPercent=0,maximumPercent=200" \
            --region ap-south-1

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: scentaura-service
          cluster: scentaura-cluster
          wait-for-service-stability: true

      - name: Smoke tests
        run: |
          sleep 30
          BASE_URL="http://13.205.223.224"

          check_url() {
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$1")
            if [ "$STATUS" != "200" ]; then
              echo "FAIL: $1 returned $STATUS"
              exit 1
            else
              echo "PASS: $1 returned $STATUS"
            fi
          }

          check_url "$BASE_URL"
          check_url "$BASE_URL/products.php"
          check_url "$BASE_URL/login.php"
          check_url "$BASE_URL/blog.php"
          check_url "$BASE_URL/about.php"
          check_url "$BASE_URL/contact.php"
