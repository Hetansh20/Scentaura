name: Deploy to ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        run: |
          docker build -t scentaura-app .
          docker tag scentaura-app:latest 976497228635.dkr.ecr.ap-south-1.amazonaws.com/scentaura:latest
          docker push 976497228635.dkr.ecr.ap-south-1.amazonaws.com/scentaura:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster scentaura-cluster \
            --service scentaura-service \
            --task-definition scentaura-task:3 \
            --force-new-deployment \
            --region ap-south-1
